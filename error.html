<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - System Error</title>
<link rel="stylesheet" href="css/error.css">
</head>

<body>

<div class="error-container">

    <!-- BACKGROUND EFFECT -->
    <div class="glow-bg"></div>
    <div class="grid-lines"></div>

    <!-- MAIN CONTENT -->
    <div class="error-box">

        <div class="error-code">
            404
        </div>

        <h1>System Route Not Found</h1>

        <p>
            The requested module could not be located in the trading system.
            It may have been moved, deleted, or never existed.
        </p>

        <!-- STATUS CARD -->
        <div class="status-card">

            <div class="status-item">
                <span>Status</span>
                <strong>FAILED</strong>
            </div>

            <div class="status-item">
                <span>Server</span>
                <strong>ONLINE</strong>
            </div>

            <div class="status-item">
                <span>Error Code</span>
                <strong>ERR_ROUTE_404</strong>
            </div>

        </div>

        <!-- BUTTONS -->
        <div class="btn-group">

            <a href="index.html" class="btn primary">Go Home</a>
            <button onclick="history.back()" class="btn secondary">Go Back</button>

        </div>

        <!-- SCANNING TEXT -->
        <div class="scan-text">
            SCANNING SYSTEM ROUTES...
        </div>

    </div>

</div>

</body>
</html>
